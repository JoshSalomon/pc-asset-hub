apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: assethubs.assethub.project-catalyst.io
spec:
  group: assethub.project-catalyst.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                dbConnection:
                  type: string
                uiReplicas:
                  type: integer
                  minimum: 1
                  default: 1
                environment:
                  type: string
                  enum: ["development", "openshift"]
                  default: development
                apiNodePort:
                  type: integer
                uiNodePort:
                  type: integer
                apiHostname:
                  type: string
                uiHostname:
                  type: string
                corsOrigins:
                  type: string
                logLevel:
                  type: string
                  default: info
                clusterRole:
                  type: string
                  enum: ["development", "testing", "production"]
                  default: development
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: assethubs
    singular: assethub
    kind: AssetHub
    shortNames:
      - ah
