apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: catalogs.assethub.project-catalyst.io
spec:
  group: assethub.project-catalyst.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["catalogName"]
              properties:
                catalogName:
                  type: string
                catalogVersionLabel:
                  type: string
                validationStatus:
                  type: string
                  enum: ["draft", "valid", "invalid"]
                apiEndpoint:
                  type: string
                syncVersion:
                  type: integer
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                dataVersion:
                  type: integer
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: catalogs
    singular: catalog
    kind: Catalog
    shortNames:
      - cat
