apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: catalogversions.assethub.project-catalyst.io
spec:
  group: assethub.project-catalyst.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["versionLabel", "lifecycleStage"]
              properties:
                versionLabel:
                  type: string
                description:
                  type: string
                lifecycleStage:
                  type: string
                  enum: ["testing", "production"]
                entityTypes:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: catalogversions
    singular: catalogversion
    kind: CatalogVersion
    shortNames:
      - cv
