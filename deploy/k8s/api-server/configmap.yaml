apiVersion: v1
kind: ConfigMap
metadata:
  name: api-server-config
  namespace: assethub
data:
  DB_DRIVER: postgres
  DB_CONNECTION_STRING: "host=postgres user=assethub password=assethub dbname=assethub port=5432 sslmode=disable"
  API_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "http://localhost:30000"
  LOG_LEVEL: info
  RBAC_MODE: header
