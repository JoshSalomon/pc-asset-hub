services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assethub
      POSTGRES_PASSWORD: assethub
      POSTGRES_DB: assethub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assethub"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api-server:
    image: assethub/api-server:latest
    environment:
      DB_DRIVER: postgres
      DB_CONNECTION_STRING: "host=postgres user=assethub password=assethub dbname=assethub port=5432 sslmode=disable"
      API_PORT: "8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:30000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: assethub/ui:latest
    ports:
      - "3000:80"
    depends_on:
      - api-server

volumes:
  pgdata:
