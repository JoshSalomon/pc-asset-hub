<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PC Asset Hub — Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;700;900&family=Red+Hat+Text:wght@400;500&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* === TOKENS === */
    :root {
      /* Surface */
      --bg-dark: #151515;
      --bg-light: #ffffff;
      --bg-light-alt: #f9f9f9;

      /* Text on light */
      --text-dark-primary: #151515;
      --text-dark-secondary: #4d4d4d;
      --text-dark-muted: #707070;

      /* Text on dark */
      --text-light-primary: #ffffff;
      --text-light-secondary: #c7c7c7;
      --text-light-muted: #8c8c8c;

      /* Brand */
      --rh-red: #ee0000;
      --rh-red-dark: #a60000;
      --rh-red-light: #fce3e3;

      /* Accents */
      --teal-50: #37a3a3;
      --teal-40: #63bdbd;
      --teal-70: #004d4d;
      --teal-10: #daf2f2;
      --orange-40: #f5921b;
      --orange-20: #fccb8f;
      --orange-10: #ffe8cc;
      --purple-50: #5e40be;
      --purple-40: #876fd4;
      --purple-10: #ece6ff;

      /* Diagram */
      --border-diagram: #e0e0e0;
      --border-subtle-dark: #383838;

      /* Type */
      --font-display: "Red Hat Display", sans-serif;
      --font-text: "Red Hat Text", sans-serif;
      --font-mono: "Red Hat Mono", monospace;

      /* Scale */
      --fs-display: 3.5rem;
      --fs-h2: 2rem;
      --fs-h3: 1.4rem;
      --fs-body: 1.1rem;
      --fs-body-lead: 1.25rem;
      --fs-label: 0.75rem;
      --fs-small: 0.85rem;

      /* Spacing */
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4.5rem;

      /* Layout */
      --content-max: 1100px;
      --slide-padding: 5rem;

      /* Animation */
      --stagger-delay: 100ms;
      --transition-exit: 220ms;
      --transition-enter: 350ms;
      --bg-cross: 600ms;
      --ease-pop: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* === BASE === */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-text);
      font-size: var(--fs-body);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    main.deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      transition: background var(--bg-cross) ease-in-out;
    }

    /* === LAYOUT === */
    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 100vh;
      padding: var(--space-3xl) var(--slide-padding);
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(0.96);
      transition:
        opacity var(--transition-exit) ease-in,
        transform var(--transition-exit) ease-in,
        visibility 0s linear var(--transition-exit);
    }
    main.deck[data-slide-current="1"] .slide[data-slide="1"],
    main.deck[data-slide-current="2"] .slide[data-slide="2"],
    main.deck[data-slide-current="3"] .slide[data-slide="3"],
    main.deck[data-slide-current="4"] .slide[data-slide="4"],
    main.deck[data-slide-current="5"] .slide[data-slide="5"],
    main.deck[data-slide-current="6"] .slide[data-slide="6"],
    main.deck[data-slide-current="7"] .slide[data-slide="7"],
    main.deck[data-slide-current="8"] .slide[data-slide="8"],
    main.deck[data-slide-current="9"] .slide[data-slide="9"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: scale(1);
      transition:
        opacity var(--transition-enter) var(--ease-pop),
        transform var(--transition-enter) var(--ease-pop),
        visibility 0s linear 0s;
    }
    .slide-inner {
      max-width: var(--content-max);
      width: 100%;
      margin: 0 auto;
    }
    .slide-eyebrow {
      font-size: var(--fs-label);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--rh-red);
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* === TYPOGRAPHY === */
    .display {
      font-family: var(--font-display);
      font-size: var(--fs-display);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 900;
      margin: 0;
    }
    .h2 {
      font-family: var(--font-display);
      font-size: var(--fs-h2);
      line-height: 1.2;
      letter-spacing: -0.01em;
      font-weight: 700;
      margin: 0 0 var(--space-md);
    }
    .h3 {
      font-family: var(--font-display);
      font-size: var(--fs-h3);
      line-height: 1.3;
      letter-spacing: -0.005em;
      font-weight: 700;
      margin: 0 0 var(--space-sm);
    }
    .lead {
      font-size: var(--fs-body-lead);
      line-height: 1.5;
      margin: var(--space-md) 0 0;
      max-width: 75ch;
    }
    .label {
      font-size: var(--fs-label);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .mono {
      font-family: var(--font-mono);
      font-size: var(--fs-small);
    }

    /* === SLIDE THEMES === */
    .slide-dark {
      background: var(--bg-dark);
      color: var(--text-light-primary);
    }
    .slide-dark .lead { color: var(--text-light-secondary); }
    .slide-dark .display { color: var(--text-light-primary); }
    .slide-dark .h2, .slide-dark .h3 { color: var(--text-light-primary); }

    .slide-light {
      background: var(--bg-light);
      color: var(--text-dark-primary);
    }
    .slide-light .lead { color: var(--text-dark-secondary); }
    .slide-light .display { color: var(--text-dark-primary); }
    .slide-light .h2, .slide-light .h3 { color: var(--text-dark-primary); }

    /* === ACT TINTS === */
    main.deck[data-slide-current="1"] { background: var(--bg-dark); }
    main.deck[data-slide-current="2"],
    main.deck[data-slide-current="3"],
    main.deck[data-slide-current="4"],
    main.deck[data-slide-current="5"],
    main.deck[data-slide-current="6"],
    main.deck[data-slide-current="7"],
    main.deck[data-slide-current="8"] { background: var(--bg-light); }
    main.deck[data-slide-current="9"] { background: var(--bg-dark); }

    /* === MOTION LIBRARY === */
    @keyframes fade-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-right { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slide-left { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scale-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes draw-line {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes highlight-bg {
      0% { background-size: 0% 100%; opacity: 0; }
      25% { opacity: 1; }
      60% { background-size: 100% 100%; }
      100% { background-size: 100% 100%; opacity: 1; }
    }

    main.deck .slide.current .anim-fade-up { animation: fade-up 400ms var(--ease-pop) both; animation-delay: calc(var(--index, 0) * var(--stagger-delay)); }
    main.deck .slide.current .anim-fade-in { animation: fade-in 400ms ease-out both; animation-delay: calc(var(--index, 0) * var(--stagger-delay)); }
    main.deck .slide.current .anim-slide-right { animation: slide-right 500ms var(--ease-pop) both; animation-delay: calc(var(--index, 0) * var(--stagger-delay)); }
    main.deck .slide.current .anim-slide-left { animation: slide-left 500ms var(--ease-pop) both; animation-delay: calc(var(--index, 0) * var(--stagger-delay)); }
    main.deck .slide.current .anim-scale-in { animation: scale-in 450ms var(--ease-pop) both; animation-delay: calc(var(--index, 0) * var(--stagger-delay)); }

    /* Sequential animation system */
    .seq-step {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 350ms var(--ease-pop), transform 350ms var(--ease-pop);
    }
    .seq-step.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .highlight {
      background-image: linear-gradient(90deg, rgba(238, 0, 0, 0.15), rgba(238, 0, 0, 0.08));
      background-repeat: no-repeat;
      background-size: 0% 100%;
      transition: background-size 700ms var(--ease-pop);
    }
    main.deck .slide.current .highlight.active {
      background-size: 100% 100%;
    }

    /* === CONTROLS === */
    .deck-controls {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      background: rgba(21, 21, 21, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-subtle-dark);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      z-index: 50;
    }
    .deck-controls button {
      width: 38px;
      height: 38px;
      background: transparent;
      border: none;
      color: var(--rh-red);
      font-size: 1.3rem;
      cursor: pointer;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 180ms ease-out, color 180ms ease-out;
    }
    .deck-controls button:hover:not(:disabled) { background: rgba(238, 0, 0, 0.15); color: var(--rh-red); }
    .deck-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
    .deck-dots {
      display: flex;
      gap: 0.35rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .deck-dots button {
      width: 10px;
      height: 10px;
      padding: 0;
      border-radius: 50%;
      background: var(--text-light-muted);
      transition: background 180ms ease-out, transform 180ms ease-out;
      color: transparent;
      font-size: 0;
    }
    .deck-dots button[aria-current="true"] {
      background: var(--rh-red);
      transform: scale(1.4);
      box-shadow: 0 0 16px rgba(238, 0, 0, 0.5);
    }
    .deck-dots button:hover {
      background: var(--rh-red);
    }
    .deck-counter {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-light-muted);
      letter-spacing: 0.06em;
      padding: 0 var(--space-sm);
      border-left: 1px solid var(--border-subtle-dark);
    }
    .deck-controls button:focus-visible,
    .deck-dots button:focus-visible {
      outline: 2px solid var(--rh-red);
      outline-offset: 2px;
    }

    /* === REDUCED MOTION === */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 180ms !important; }
      main.deck .slide.current .anim-fade-up,
      main.deck .slide.current .anim-slide-right,
      main.deck .slide.current .anim-slide-left,
      main.deck .slide.current .anim-scale-in,
      main.deck .slide.current .anim-fade-in { animation: fade-in 180ms ease-out both; }
      .seq-step { opacity: 1; transform: translateY(0); transition: none; }
      .highlight { transition: none; background-size: 100% 100%; }
    }

    /* === PRINT === */
    @media print {
      html, body, main.deck { overflow: visible; height: auto; }
      main.deck { background: #fff !important; }
      .deck-controls { display: none !important; }
      .slide {
        position: relative;
        opacity: 1 !important;
        visibility: visible !important;
        transform: none !important;
        pointer-events: auto;
        page-break-after: always;
        break-after: page;
        background: #fff;
        color: #1a1a1a;
        padding: 0.5in;
        min-height: auto;
      }
      .slide-dark { background: #fff !important; color: #1a1a1a !important; }
      .display, .h2, .h3, .lead { color: #1a1a1a !important; }
      .slide-eyebrow { color: #a60000 !important; }
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      :root {
        --fs-display: 2.2rem;
        --fs-h2: 1.5rem;
        --fs-h3: 1.15rem;
        --fs-body-lead: 1.05rem;
        --slide-padding: 2rem;
      }
      .slide { padding: 2rem 1.25rem; }
      .deck-controls { padding: 0.3rem 0.6rem; gap: 0.5rem; }
      .deck-controls button { width: 32px; height: 32px; font-size: 1.05rem; }
      .deck-dots button { width: 8px; height: 8px; }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck" data-slide-current="1">
    <section class="slide slide-dark" data-slide="1" aria-label="Slide 1">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="2" aria-label="Slide 2">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="3" aria-label="Slide 3">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="4" aria-label="Slide 4">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="5" aria-label="Slide 5">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="6" aria-label="Slide 6">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="7" aria-label="Slide 7">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-light" data-slide="8" aria-label="Slide 8">
      <div class="slide-inner"></div>
    </section>

    <section class="slide slide-dark" data-slide="9" aria-label="Slide 9">
      <div class="slide-inner"></div>
    </section>
  </main>

  <nav class="deck-controls" aria-label="Deck navigation">
    <button class="btn-prev" type="button" aria-label="Previous slide" data-action="prev">&larr;</button>
    <ol class="deck-dots" role="tablist" aria-label="Slide progress">
      <li><button type="button" role="tab" aria-label="Go to slide 1" data-goto="1"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 2" data-goto="2"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 3" data-goto="3"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 4" data-goto="4"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 5" data-goto="5"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 6" data-goto="6"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 7" data-goto="7"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 8" data-goto="8"></button></li>
      <li><button type="button" role="tab" aria-label="Go to slide 9" data-goto="9"></button></li>
    </ol>
    <button class="btn-next" type="button" aria-label="Next slide" data-action="next">&rarr;</button>
    <span class="deck-counter" aria-live="polite">01 / 09</span>
  </nav>

  <script>
    (function () {
      'use strict';

      const TOTAL = 9;
      const deck = document.getElementById('deck');
      const slides = Array.from(deck.querySelectorAll('.slide'));
      const dots = Array.from(document.querySelectorAll('.deck-dots button'));
      const btnPrev = document.querySelector('.btn-prev');
      const btnNext = document.querySelector('.btn-next');
      const counter = document.querySelector('.deck-counter');
      const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

      const state = { current: 1 };

      function clamp(n) { return Math.max(1, Math.min(TOTAL, n)); }

      function render() {
        deck.setAttribute('data-slide-current', String(state.current));
        counter.textContent = String(state.current).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');

        dots.forEach(function (d, i) {
          if (i + 1 === state.current) d.setAttribute('aria-current', 'true');
          else d.removeAttribute('aria-current');
        });

        slides.forEach(function (s) {
          const n = parseInt(s.getAttribute('data-slide'), 10);
          if (n === state.current) {
            s.classList.add('current');
            s.removeAttribute('aria-hidden');
          } else {
            s.classList.remove('current');
            s.setAttribute('aria-hidden', 'true');
            // Cleanup on slide exit
            cleanupSlide(s);
          }
        });

        btnPrev.disabled = state.current === 1;
        btnNext.disabled = state.current === TOTAL;

        requestAnimationFrame(fireSlideAnimations);
      }

      function cleanupSlide(slide) {
        // Reset sequential steps
        Array.from(slide.querySelectorAll('.seq-step.visible')).forEach(function (el) {
          el.classList.remove('visible');
        });
        // Reset highlights
        Array.from(slide.querySelectorAll('.highlight.active')).forEach(function (el) {
          el.classList.remove('active');
        });
      }

      function goTo(n) {
        const next = clamp(n);
        if (next === state.current) return;
        state.current = next;
        render();
        syncHash();
      }

      function next() { goTo(state.current + 1); }
      function prev() { goTo(state.current - 1); }

      function syncHash() {
        const h = '#s=' + state.current;
        if (location.hash !== h) history.replaceState(null, '', h);
      }

      function readHash() {
        const m = /^#s=(\d{1,2})$/.exec(location.hash || '');
        if (m) return clamp(parseInt(m[1], 10));
        return 1;
      }

      let digitBuffer = '';
      let digitTimer = null;

      function clearBuffer() {
        digitBuffer = '';
        if (digitTimer) {
          clearTimeout(digitTimer);
          digitTimer = null;
        }
      }

      function onKey(e) {
        const k = e.key;
        if (k === 'ArrowRight' || k === 'ArrowDown' || k === 'PageDown' || k === ' ') {
          e.preventDefault();
          next();
          clearBuffer();
          return;
        }
        if (k === 'ArrowLeft' || k === 'ArrowUp' || k === 'PageUp' || k === 'Backspace') {
          e.preventDefault();
          prev();
          clearBuffer();
          return;
        }
        if (k === 'Home') {
          e.preventDefault();
          goTo(1);
          clearBuffer();
          return;
        }
        if (k === 'End') {
          e.preventDefault();
          goTo(TOTAL);
          clearBuffer();
          return;
        }
        if (/^[0-9]$/.test(k)) {
          e.preventDefault();
          digitBuffer += k;
          if (digitTimer) clearTimeout(digitTimer);

          if (digitBuffer.length === 2) {
            const two = parseInt(digitBuffer, 10);
            if (two >= 1 && two <= TOTAL) goTo(two);
            clearBuffer();
            return;
          }

          digitTimer = setTimeout(function () {
            const n = parseInt(digitBuffer, 10);
            if (n >= 1 && n <= 9) goTo(n);
            clearBuffer();
          }, 600);
        }
      }

      btnPrev.addEventListener('click', prev);
      btnNext.addEventListener('click', next);
      dots.forEach(function (d) {
        d.addEventListener('click', function () {
          goTo(parseInt(d.getAttribute('data-goto'), 10));
        });
      });
      window.addEventListener('keydown', onKey);

      function applyStaggerIndices(slide) {
        Array.from(slide.querySelectorAll('[data-stagger] > *')).forEach(function (el, i) {
          el.style.setProperty('--index', String(i));
        });
      }

      function setupSVGDraw(slide) {
        Array.from(slide.querySelectorAll('[data-draw]')).forEach(function (path) {
          const len = path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len;
        });
      }

      function runSequentialSteps(slide) {
        const steps = Array.from(slide.querySelectorAll('.seq-step'));
        if (steps.length === 0) return;

        steps.forEach(function (step, i) {
          const delay = parseInt(step.getAttribute('data-seq-delay') || '0', 10);
          const baseDelay = i * 400;
          setTimeout(function () {
            step.classList.add('visible');
          }, baseDelay + delay);
        });
      }

      function fireSlideAnimations() {
        const cur = deck.querySelector('.slide.current');
        if (!cur) return;

        applyStaggerIndices(cur);
        setupSVGDraw(cur);
        runSequentialSteps(cur);

        // Trigger highlights
        Array.from(cur.querySelectorAll('.highlight')).forEach(function (el) {
          el.classList.remove('active');
          setTimeout(function () { el.classList.add('active'); }, 100);
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        state.current = readHash();
        render();
        window.addEventListener('hashchange', function () {
          state.current = readHash();
          render();
        });
        if (deck.tabIndex < 0) deck.tabIndex = -1;
      });

      window.__deck = { goTo: goTo, next: next, prev: prev, state: state };
    }());
  </script>
</body>
</html>
